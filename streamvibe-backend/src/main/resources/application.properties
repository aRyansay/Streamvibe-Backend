jwt.secret=StreamVibe_Super_Secret_Key_Change_This_In_Production_Min256Bits
jwt.expiration-ms=86400000

server.port=8080

allowed.origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5501

#──────────────────────────────────────────
logging.level.com.streamvibe=DEBUG
logging.level.org.springframework.security=WARN


